<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 920 520" width="920" height="520" role="img" aria-labelledby="title desc">
  <title id="title">TurboCable architecture: turbocable_nats, NATS JetStream, turbocable-server</title>
  <desc id="desc">Data flow from Ruby backend through NATS to Rust WebSocket gateway and browser clients.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-ws" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- Header -->
  <text x="460" y="36" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="20" font-weight="600" fill="#0f172a">TurboCable system architecture</text>
  <text x="460" y="58" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="12" fill="#64748b">turbocable_nats (this repo) · NATS JetStream · turbocable-server (Rust)</text>
  <a xlink:href="https://github.com/samaswin/turbocable-server" target="_blank" rel="noopener">
    <text x="460" y="78" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#2563eb" text-decoration="underline">github.com/samaswin/turbocable-server</text>
  </a>
  <!-- Row 1: Clients -->
  <g filter="url(#shadow)">
    <rect x="340" y="400" width="240" height="88" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  </g>
  <text x="460" y="428" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Browser / mobile clients</text>
  <text x="460" y="448" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#475569">WebSocket · actioncable-v1-json / turbocable-v1-msgpack</text>
  <text x="460" y="468" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#94a3b8">e.g. @turbocable/client</text>
  <!-- turbocable-server -->
  <g filter="url(#shadow)">
    <rect x="300" y="240" width="320" height="120" rx="12" fill="#ffffff" stroke="#c2410c" stroke-width="2.5"/>
  </g>
  <text x="460" y="268" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#9a3412">turbocable-server</text>
  <text x="460" y="288" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#64748b">Rust WebSocket gateway (standalone binary / container)</text>
  <text x="460" y="308" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#475569">JetStream push consumer · fan-out to subscribers (DashMap registry)</text>
  <text x="460" y="328" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#94a3b8">HTTP :9292  /cable, /health, /metrics</text>
  <text x="460" y="348" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#94a3b8">Creates TURBOCABLE stream on startup · JWT via NATS KV (TC_PUBKEYS)</text>
  <!-- NATS -->
  <g filter="url(#shadow)">
    <rect x="310" y="120" width="300" height="88" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  </g>
  <text x="460" y="148" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#5b21b6">NATS Server (JetStream enabled)</text>
  <text x="460" y="168" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#64748b">Stream: TURBOCABLE · subjects: TURBOCABLE.&gt;</text>
  <text x="460" y="188" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#94a3b8">TCP :4222 · persists &amp; delivers to gateway consumers</text>
  <!-- Backend left -->
  <g filter="url(#shadow)">
    <rect x="40" y="230" width="220" height="140" rx="10" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="150" y="258" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#1e3a8a">Your backend (Ruby)</text>
  <text x="150" y="280" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#64748b">Rails / Sinatra / workers</text>
  <text x="150" y="300" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#475569">turbocable_nats gem</text>
  <text x="150" y="320" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#94a3b8">Turbocable.broadcast(stream, payload)</text>
  <text x="150" y="340" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#94a3b8">Publishes only  no WS in app process</text>
  <!-- Optional rails -->
  <text x="150" y="362" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="9" fill="#cbd5e1">optional: turbocable-rails DSL</text>
  <!-- Legend note right -->
  <g filter="url(#shadow)">
    <rect x="660" y="230" width="220" height="140" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  </g>
  <text x="770" y="256" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#334155">Connection summary</text>
  <text x="675" y="282" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#64748b">" Gem ’ NATS :4222 (publish)</text>
  <text x="675" y="300" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#64748b">" Gateway ’ NATS (consumer)</text>
  <text x="675" y="318" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#64748b">" Clients ’ gateway :9292 (WS)</text>
  <text x="675" y="340" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#94a3b8">Gem does not open TCP to</text>
  <text x="675" y="354" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#94a3b8">turbocable-server directly.</text>
  <!-- Arrows: backend to NATS -->
  <line x1="260" y1="290" x2="300" y2="164" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="255" y="215" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#334155" transform="rotate(-52 255 215)">JetStream publish</text>
  <text x="268" y="228" font-family="system-ui, Segoe UI, sans-serif" font-size="9" fill="#64748b">TURBOCABLE.*</text>
  <!-- NATS to server -->
  <line x1="460" y1="208" x2="460" y2="238" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="475" y="228" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#334155">push / deliver</text>
  <!-- Server to clients -->
  <line x1="460" y1="360" x2="460" y2="398" stroke="#0d9488" stroke-width="2.5" marker-end="url(#arrow-ws)"/>
  <text x="475" y="382" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#0f766e">WebSocket fan-out</text>
  <!-- Footer -->
  <text x="460" y="505" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#94a3b8">O(1) work per broadcast in your app · O(N) fan-out in turbocable-server</text>
</svg>
