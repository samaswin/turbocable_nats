name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # create GitHub release
  id-token: write   # OIDC token for trusted RubyGems publishing

jobs:
  release:
    runs-on: ubuntu-latest
    environment: rubygems   # must be configured in repo Settings → Environments

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # Run the full test suite before publishing — a failing test aborts the release.
      - name: Run RSpec
        run: bundle exec rspec

      - name: Run StandardRB
        run: bundle exec standardrb

      - name: Build gem
        run: gem build turbocable.gemspec

      # Trusted publishing via OIDC — no long-lived API key stored in secrets.
      # Requires the gem to be registered on RubyGems.org with trusted publishing
      # enabled for this repository. See:
      # https://guides.rubygems.org/trusted-publishing/
      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1

      # Create a GitHub release with the CHANGELOG entry for this tag as the body.
      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. "v1.0.0"
          VERSION="${TAG#v}"                # strip leading "v"
          # Extract the section for this version from CHANGELOG.md.
          # Uses awk: print lines between the first "## [VERSION]" heading
          # and the next "## [" heading (exclusive).
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} flag && /^## \[/{exit} flag{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: "*.gem"
